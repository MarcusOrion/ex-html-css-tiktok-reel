<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
      <div>
        <i class="bi-play-btn"></i>
        <nav>
        <ul>
          <li><a href="#">Esplora</a></li>
          <li><a href="#">Seguiti</a></li>
          <li><a href="#">Per te</a></li>
        </ul>
        </nav>
        <i class="bi-search"></i>
      </div>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="boolean-profile">
      <img src="../assets/img/boolean_logo.png" alt="Logo Boolean per il profilo utente">
      </div>
      <i class="bi-heart-fill"><span>588</span></i>
      <i class="bi-chat-dots-fill"><span>13</span></i>
      <i class="bi-bookmark-fill"><span>638</span></i>
      <i class="bi-share-fill"><span>491</span></i>
    </div>

    <!-- Footer -->
    <footer>

    </footer>
  </div>

</body>

</html>
